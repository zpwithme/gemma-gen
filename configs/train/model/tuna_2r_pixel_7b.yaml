# Variant B: SigLIP-only pixel diffusion Tuna (~7B). No VAE.
# Uses Qwen2.5-7B-Instruct as the LLM backbone.

_target_: tuna.models.tuna_2r_pixel.Tuna2RPixelModel
_recursive_: false

# SigLIP2 uniencoder config
siglip_model_id: "configs/pretrained/siglip2-so400m-patch16-384"
# image_size override — checkpoint was trained at 512 so position_embedding is
# [1024, 1152]. With pretrained 384 it would be [576, 1152].
siglip_image_size: 512
# Use the second-to-last hidden layer (tuna uniencoder_feature_layer=-2).
# Truncates the SigLIP encoder to 26 of its 27 layers.
siglip_feature_layer: -2

# Tuna-qwen config
llm_model_path: "Qwen/Qwen2.5-7B-Instruct"
frozen_params: ['vae']
hidden_size: 3584
image_latent_dim: 3
image_latent_height: 16
image_latent_width: 16
hq_image_latent_height: 64
hq_image_latent_width: 64
mixed_modal_latent_height: 32
mixed_modal_latent_width: 32
patch_size: 16
clip_latent_dim: 1152
add_time_embeds: true
add_aspect_ratio_embeds: false
flow_head_num: 16
mrope_type: dit_3drope_mm
reshape_frame_to_batch_dim: false
num_attention_heads: 56
num_key_value_heads: 14
attention_backend: sdpa

# Transport (flow-matching)
path_type: "Linear"
prediction: "velocity"
loss_weight: null
train_eps: null
sample_eps: null
snr_type: "lognorm"
do_shift: true

# Sampling
sampling_method: "euler"
guidance_scale: 7.5
num_inference_steps: 50
atol: 1.0e-6
rtol: 1.0e-3
reverse: false
time_shifting_factor: 3.0

# Training
ntp_coeff: 1.0
flow_coeff: 1.0
und_max_t0: 1.0
use_disp: false
load_stage1_model: null
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

dtype: "bf16"

# DeTok-style masked image modelling
enable_mask_token: false
masked_image_ratio: 0.75
masked_image_ratio_min: 0.0

# MMU noise
mmu_noise_prob: 0.1
mmu_noise_level: 0.1

# JiT noise
noise_scale: 2.0
