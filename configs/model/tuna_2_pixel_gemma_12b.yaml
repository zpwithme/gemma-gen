# Tuna-2 pixel variant with Gemma 4 12B backbone, optional PixelREPA,
# and optional MiniT2I-style BottleneckPatchEmbedding.
#
# Used for S1 (image) ablations:
#   * A. Qwen baseline       -> use model=tuna_2_pixel_7b
#   * B. +Gemma              -> this file with enable_pixelrepa=false, vision_encoder_type=simple
#   * C. +PixelREPA (Qwen)   -> use tuna_2_pixel_7b + override enable_pixelrepa (via train override)
#   * D. +Both               -> this file with enable_pixelrepa=true
#   * E. +Bottleneck (Gemma) -> this file with vision_encoder_type=bottleneck, enable_pixelrepa=false
#   * F. +Bottleneck+REPA    -> this file with vision_encoder_type=bottleneck, enable_pixelrepa=true

_target_: tuna.models.tuna_2_pixel_gemma.Tuna2PixelGemmaModel
_recursive_: false

# -------- LLM backbone --------
llm_model_path: "google/gemma-4-12b"       # adjust per actual HF repo id
llm_family: "gemma4"                        # routes tokenizer + special tokens
load_stage1_model: null
frozen_params: []                           # empty = full fine-tune (default for S1)

# -------- Architecture (auto-overridden by Gemma's own HF config at load) --------
# These are advisory only; actual values pulled from AutoConfig.from_pretrained.
hidden_size: 3072
num_attention_heads: 24
num_key_value_heads: 8
attention_backend: sdpa

# Gemma-specific attention handling
sliding_window: 1024
gemma_omni_override: true
preserve_text_sliding: true

# -------- Pixel patchify (Tuna-2 native) --------
patch_size: 16
image_latent_dim: 3
image_latent_height: 16
image_latent_width: 16
hq_image_latent_height: 64
hq_image_latent_width: 64
mixed_modal_latent_height: 32
mixed_modal_latent_width: 32

# -------- Vision encoder (NEW: MiniT2I-style bottleneck switch) --------
vision_encoder_type: "simple"               # 'simple' (Conv2d) or 'bottleneck'
vision_bottleneck_dim: 64                   # only used when type='bottleneck'

# -------- RoPE / Time / Aspect ratio --------
mrope_type: dit_3drope_mm
add_time_embeds: true
add_aspect_ratio_embeds: false
reshape_frame_to_batch_dim: false

# -------- Diffusion head --------
flow_head_num: 16

# -------- DeTok masked-image modelling --------
enable_mask_token: true
masked_image_ratio: 0.3
masked_image_ratio_min: -0.7

# -------- MMU noise --------
mmu_noise_prob: 0.1
mmu_noise_level: 0.1

# -------- JiT noise --------
noise_scale: 2.0

# -------- Transport (flow matching) --------
path_type: "Linear"
prediction: "velocity"
snr_type: "lognorm"
do_shift: true

# -------- Training coefficients --------
ntp_coeff: 1.0
flow_coeff: 1.0
und_max_t0: 1.0

# -------- Sampling defaults --------
sampling_method: "euler"
guidance_scale: 7.5
num_inference_steps: 50
time_shifting_factor: 3.0
atol: 1.0e-6
rtol: 1.0e-3
reverse: false

# -------- Mixed precision --------
dtype: "bf16"
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# -------- PixelREPA (optional auxiliary, default OFF) --------
enable_pixelrepa: false
pixelrepa_config:
  target_model_id: "facebook/dinov2-large"
  target_hidden_size: 1024
  adapter_depth: 2
  adapter_heads: 8
  mask_ratio: 0.5
  loss_weight: 0.5
  from_layer: -8
  target_image_size: 224
