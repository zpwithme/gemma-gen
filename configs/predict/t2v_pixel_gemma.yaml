# Pixel-space AR video inference config for Tuna-2 + Gemma 4 12B.

defaults:
  - model: tuna_2_pixel_gemma_12b
  - _self_

inference:
  inference_mode: t2v_ar
  pipe: Tuna2PixelARVideoPipeline
  use_ckpt: true
  ckpt_path: ./checkpoints/tuna_2_pixel_gemma_video.pt
  output_dir: ./outputs/predictions/t2v_pixel_gemma
  generation_mode: t2v_pixel
  use_chat_template: false
  weight_dtype: bfloat16

  # Frame layout
  height: 512
  width: 512
  num_frames: 16
  frames_per_chunk: 4
  patch_size: 16

  # Diffusion within chunk
  num_diffusion_steps_per_chunk: 8
  guidance_scale: 4.0
  noise_scale: 2.0
  sampling_method: euler
  shift: 3.0

  # Few-step inference (if using a Mean Flow distilled student)
  use_mean_flow: false
  mean_flow_intervals: 4

  seed: 42

  negative_prompt: "ugly, distorted, blurry, low quality, watermark, text artifacts"

prompt: "A cat walking on the beach at sunset, photorealistic, cinematic lighting."
